<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Electrolineras España</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">

  <!-- App styles -->
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="header-title">
        <h1>⚡ <span id="appTitle">Electrolineras España</span></h1>
        <p id="appSubtitle">Puntos de recarga para vehículos eléctricos</p>
      </div>
      <div class="header-search">
        <input type="text" id="searchInput" placeholder="Buscar ciudad o dirección…">
      </div>
      <div class="header-actions">
        <button class="filters-btn" id="filtersBtn" title="Filtros">
          <span>☰</span>
          <span id="filtersBtnLabel">Filtros</span>
          <span class="filter-count" id="filterCount">0</span>
        </button>
        <select id="langSelect"></select>
        <button class="icon-btn" id="aboutBtn" title="Acerca de">ℹ️</button>
      </div>
    </div>
    <div class="header-status">
      <span class="station-count" id="stationCount"></span>
    </div>
  </div>

  <!-- Filters drawer -->
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-header">
      <h2 id="drawerTitle">Filtros</h2>
      <button class="drawer-close" id="drawerClose" aria-label="Close">✕</button>
    </div>
    <div class="drawer-body">
      <div class="drawer-section">
        <label id="labelConnector">Conector</label>
        <select id="connectorFilter"><option value="">Todos los conectores</option></select>
      </div>
      <div class="drawer-section">
        <label id="labelPower">Potencia</label>
        <select id="powerFilter">
          <option value="">Todas las potencias</option>
          <option value="slow">Lento (≤7 kW)</option>
          <option value="semiRapid">Semi-rápido (7–22 kW)</option>
          <option value="rapid">Rápido (22–50 kW)</option>
          <option value="ultra">Ultra-rápido (>50 kW)</option>
        </select>
      </div>
      <div class="drawer-section">
        <label id="labelOperator">Operador</label>
        <select id="operatorFilter"><option value="">Todos los operadores</option></select>
      </div>
      <div class="drawer-footer">
        <button class="clear-btn" id="clearFilters">Limpiar filtros</button>
        <button class="clear-btn" id="refreshBtn">🔄 Actualizar</button>
      </div>
    </div>
  </aside>

  <!-- Map -->
  <div id="map"></div>

  <!-- Footer -->
  <div class="footer" id="footer"></div>

  <!-- Loading -->
  <div class="loading-overlay" id="loading" style="display:flex">
    <div class="spinner"></div>
    <span>Cargando puntos de recarga…</span>
  </div>

  <!-- About modal -->
  <div class="modal-overlay" id="aboutModal">
    <div class="modal-content">
      <button class="modal-close" id="aboutClose">&times;</button>
      <div id="aboutBody"></div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="js/config.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/map.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
